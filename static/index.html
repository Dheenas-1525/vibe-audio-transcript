<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ViBe Audio Transcript</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: system-ui, sans-serif; background: #0f1117; color: #e6e6e6;
         min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
  h1 { font-size: 1.8rem; margin-bottom: 4px; }
  h1 span { color: #7c5cff; }
  p.sub { color: #888; margin-bottom: 28px; }
  .card { background: #181b24; border: 1px solid #2a2e3b; border-radius: 12px;
          padding: 24px; width: 100%; max-width: 720px; }
  .row { display: flex; gap: 10px; }
  input { flex: 1; padding: 12px 14px; border-radius: 8px; border: 1px solid #2a2e3b;
          background: #0f1117; color: #fff; font-size: 1rem; }
  button { padding: 12px 20px; border: 0; border-radius: 8px; background: #7c5cff;
           color: #fff; font-size: 1rem; cursor: pointer; }
  button:disabled { opacity: .5; cursor: wait; }
  #status { margin: 16px 0 0; color: #9aa; min-height: 1.2em; }
  #downloads { margin-top: 16px; display: none; gap: 10px; }
  #downloads a, #qb-download a { padding: 8px 16px; border-radius: 8px; background: #232736;
                 color: #cfd3ff; text-decoration: none; font-size: .9rem; }
  #transcript { margin-top: 20px; max-height: 420px; overflow-y: auto; display: none;
                border-top: 1px solid #2a2e3b; padding-top: 16px; }
  .seg { display: flex; gap: 12px; padding: 6px 0; font-size: .95rem; line-height: 1.5; }
  .seg .ts { color: #7c5cff; font-family: monospace; white-space: nowrap; }
</style>
</head>
<body>
  <h1>Vi<span>Be</span> Audio Transcript</h1>
  <p class="sub">Paste a YouTube URL → get a timestamped transcript → generate a question bank</p>
  <div class="card">
    <div class="row">
      <input id="url" placeholder="https://www.youtube.com/watch?v=..." />
      <button id="go">Transcribe</button>
    </div>
    <div id="status"></div>
    <div id="downloads" class="row">
      <a id="dl-txt" download>Download .txt</a>
      <a id="dl-srt" download>Download .srt</a>
      <a id="dl-vtt" download>Download .vtt</a>
    </div>
    <div id="transcript"></div>
  </div>
  <div class="card" id="qb-card" style="display:none; margin-top:20px;">
    <div class="row">
      <input id="qb-template" type="file" accept=".csv" style="flex:2; padding:9px 14px;" />
      <input id="qb-count" type="number" value="5" min="1" max="20" title="Questions per segment"
             style="flex:0 0 80px; padding:9px 14px;" />
      <button id="qb-go">Generate Question Bank</button>
    </div>
    <div id="qb-status" style="margin-top:16px; color:#9aa; min-height:1.2em;"></div>
    <div id="qb-download" style="display:none; margin-top:16px;">
      <a id="qb-dl" download>Download Question Bank CSV</a>
    </div>
  </div>
<script>
const $ = id => document.getElementById(id);
let timer, qbTimer, currentJobId;

function ts(sec) {
  const h = String(Math.floor(sec / 3600)).padStart(2, "0");
  const m = String(Math.floor(sec % 3600 / 60)).padStart(2, "0");
  const s = String(Math.floor(sec % 60)).padStart(2, "0");
  return `${h}:${m}:${s}`;
}

$("go").onclick = async () => {
  const url = $("url").value.trim();
  if (!url) return;
  $("go").disabled = true;
  $("downloads").style.display = "none";
  $("transcript").style.display = "none";
  $("qb-card").style.display = "none";
  $("qb-download").style.display = "none";
  $("status").textContent = "Starting...";
  try {
    const r = await fetch("/api/transcribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    if (!r.ok) throw new Error((await r.json()).detail);
    poll((await r.json()).job_id);
  } catch (e) {
    $("status").textContent = "Error: " + e.message;
    $("go").disabled = false;
  }
};

function poll(id) {
  clearInterval(timer);
  timer = setInterval(async () => {
    const job = await (await fetch(`/api/status/${id}`)).json();
    if (job.status === "downloading") $("status").textContent = "Downloading audio...";
    else if (job.status === "transcribing")
      $("status").textContent = `Transcribing... ${ts(job.progress || 0)} processed`;
    else if (job.status === "error") {
      clearInterval(timer);
      $("status").textContent = "Error: " + job.error;
      $("go").disabled = false;
    } else if (job.status === "done") {
      clearInterval(timer);
      $("status").textContent = `Done — ${job.title}`;
      for (const f of ["txt", "srt", "vtt"])
        $("dl-" + f).href = `/api/download/${id}?fmt=${f}`;
      $("downloads").style.display = "flex";
      $("transcript").innerHTML = job.segments.map(s =>
        `<div class="seg"><span class="ts">${ts(s.start)}</span><span>${s.text
          .replace(/&/g, "&amp;").replace(/</g, "&lt;")}</span></div>`).join("");
      $("transcript").style.display = "block";
      $("go").disabled = false;
      currentJobId = id;
      $("qb-card").style.display = "block";
    }
  }, 1500);
}

$("qb-go").onclick = async () => {
  const file = $("qb-template").files[0];
  if (!file || !currentJobId) return;
  $("qb-go").disabled = true;
  $("qb-download").style.display = "none";
  $("qb-status").textContent = "Starting...";
  const fd = new FormData();
  fd.append("template", file);
  fd.append("questions_per_segment", $("qb-count").value || 5);
  try {
    const r = await fetch(`/api/generate-questions/${currentJobId}`, { method: "POST", body: fd });
    if (!r.ok) throw new Error((await r.json()).detail);
    pollQB(currentJobId);
  } catch (e) {
    $("qb-status").textContent = "Error: " + e.message;
    $("qb-go").disabled = false;
  }
};

function pollQB(id) {
  clearInterval(qbTimer);
  qbTimer = setInterval(async () => {
    const job = await (await fetch(`/api/qb-status/${id}`)).json();
    if (job.qb_status === "queued") {
      $("qb-status").textContent = "Queued...";
    } else if (job.qb_status === "generating") {
      const p = job.qb_progress || {};
      $("qb-status").textContent = `Generating questions... chunk ${p.done || 0}/${p.total || "?"}`;
    } else if (job.qb_status === "error") {
      clearInterval(qbTimer);
      $("qb-status").textContent = "Error: " + job.qb_error;
      $("qb-go").disabled = false;
    } else if (job.qb_status === "done") {
      clearInterval(qbTimer);
      $("qb-status").textContent = "Question bank ready.";
      $("qb-dl").href = `/api/download-questions/${id}`;
      $("qb-download").style.display = "block";
      $("qb-go").disabled = false;
    }
  }, 1500);
}
</script>
</body>
</html>
