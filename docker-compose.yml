services:
  vibe:
    build: .
    container_name: vibe-audio-transcript
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      # tiny | base | small | medium | large-v3 (bigger = more accurate, slower)
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      # cpu | cuda — on a GPU host, also use docker-compose.gpu.yml (see MANUAL.html)
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      # Self-hosted vLLM OpenAI-compatible endpoint for question-bank generation
      VLLM_API_BASE: ${VLLM_API_BASE:-}
      VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
      VLLM_MODEL: ${VLLM_MODEL:-}
    volumes:
      - whisper-models:/root/.cache/huggingface
      - app-data:/app/data
    restart: unless-stopped

volumes:
  whisper-models:
  app-data:
